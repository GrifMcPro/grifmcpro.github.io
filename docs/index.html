<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a0a 100%);
            font-family: 'Montserrat', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .hero-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.3;
        }
        .hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(30,30,0,0.7));
            z-index: -1;
        }
        .main-container { max-width: 1400px; width: 100%; margin: 0 auto; padding: 20px; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .balance { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: bold; color: #ffd700; }
        .balance span { color: #fff; }
        .btn-logout {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
        }
        .menu-tabs {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }
        .menu-tab {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.3);
            padding: 12px 32px;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            transition: 0.3s;
        }
        .menu-tab.active { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #0a0a0a; }
        .page { display: none; }
        .page.active { display: block; }
        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 36px;
            text-align: center;
            margin: 25px 0 35px;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* МАГАЗИН */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }
        .product-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .product-card:hover { transform: translateY(-6px); border-color: #ffd700; }
        .product-icon i { font-size: 52px; color: #ffd700; margin-bottom: 15px; }
        .product-name { font-size: 24px; font-weight: bold; }
        .product-name-en { font-size: 13px; color: #ffd700; opacity: 0.8; margin-bottom: 10px; }
        .price { font-size: 30px; font-weight: bold; color: #ffd700; margin: 15px 0; }
        .product-card ul { list-style: none; margin: 15px 0; text-align: left; }
        .product-card li { padding: 8px 0; display: flex; align-items: center; gap: 10px; }
        .buy-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        /* ПРОФИЛЬ */
        .profile-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            max-width: 700px;
            margin: 0 auto;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .profile-avatar i { font-size: 60px; color: #0a0a0a; }
        .profile-info { text-align: left; margin: 25px 0; }
        .profile-info p { padding: 10px 0; border-bottom: 1px solid rgba(255,215,0,0.2); display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .profile-info i { width: 28px; color: #ffd700; }
        .edit-btn, .change-password-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 7px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 13px;
        }
        .donate-badge {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 12px;
            display: inline-block;
            margin: 4px;
            cursor: default;
        }
        /* ГЛАВНАЯ - ЛЕНТА ОБЪЯВЛЕНИЙ */
        .news-filters {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.3);
            padding: 10px 28px;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            transition: 0.2s;
        }
        .filter-btn.active, .filter-btn:hover { background: #ffd700; color: #0a0a0a; border-color: #ffd700; }
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 30px;
        }
        .news-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .news-card.featured {
            grid-column: span 2;
            background: rgba(255,69,0,0.1);
            border: 2px solid #ff4500;
        }
        .news-card:hover { transform: translateY(-5px); border-color: #ffd700; }
        .news-img { width: 100%; height: 200px; object-fit: cover; }
        .news-content { padding: 25px; }
        .news-category {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            margin-bottom: 12px;

        .news-title { font-size: 24px; font-weight: bold; margin-bottom: 12px; }
        .news-desc { font-size: 14px; color: #ccc; line-height: 1.5; margin-bottom: 20px; }
        .news-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
        }
        /* АДМИН-ПАНЕЛЬ */
        .admin-section {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 25px;
            margin-bottom: 30px;
        }
        .players-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .player-card {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .player-actions button {
            background: #3b82f6;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            margin-left: 8px;
            font-size: 12px;
        }
        .log-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 13px;
            border-left: 3px solid #ffd700;
        }
        /* МОДАЛКИ */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 6000;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-radius: 36px;
            padding: 35px;
            width: 500px;
            max-width: 90%;
            border: 1px solid #ffd700;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 16px;
            color: white;
        }
        .modal-content button {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .close-modal { float: right; font-size: 28px; cursor: pointer; color: #ffd700; }
        .auth-modal {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-radius: 48px;
            padding: 50px;
            width: 500px;
            max-width: 90%;
            border: 1px solid #ffd700;
            text-align: center;
        }
        .auth-modal h2 { margin-bottom: 30px; color: #ffd700; }
        .auth-modal input {
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 60px;
            color: white;
            font-size: 16px;
        }
        .auth-modal button {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 16px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            font-size: 18px;
        }
        .tabs-auth {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .tab-auth {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 25px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
        }
        .tab-auth.active { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #0a0a0a; }
        .tab-pane-auth { display: none; }
        .tab-pane-auth.active { display: block; }
        .verified-badge {
            width: 20px;
            height: 20px;
            min-width: 20px;
            margin-left: 6px;
            vertical-align: middle;
            display: inline-block;
        }
        .admin-login-box {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,215,0,0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @media (max-width: 768px) {
            .section-title { font-size: 28px; }
            .shop-grid { grid-template-columns: 1fr; }
            .news-grid { grid-template-columns: 1fr; }
            .news-card.featured { grid-column: span 1; }
            .balance { font-size: 20px; }
        }
    </style>
</head>
<body>

            const formData = new FormData();
            formData.append('access_key', '42864224-6df0-4e25-8068-7b486cf314dd');
            formData.append('subject', `[GrifLauncher] ${data.type}`);
            formData.append('to', 'ramonenok@bk.ru');
            formData.append('message', `${data.message}\n\nВремя: ${new Date().toLocaleString()}`);
            try { await fetch('https://api.web3forms.com/submit', { method: 'POST', body: formData }); } catch(e) {}
        }

        function renderShop() {
            const container = document.getElementById('shopGrid');
            if(!container) return;
            container.innerHTML = privileges.map(p => `
                <div class="product-card">
                    <div class="product-icon"><i class="fas ${p.icon}"></i></div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-name-en">${p.nameEn}</div>
                    <div class="price">${p.price.toLocaleString()} ₽</div>
                    <ul>${p.features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}</ul>
                    <button class="buy-btn" onclick="openBuyModal('${p.name}', ${p.price})">КУПИТЬ</button>
                </div>
            `).join('');
        }

        function renderNews(category = "all") {
            const container = document.getElementById('newsGrid');
            if(!container) return;
            const filtered = category === "all" ? newsItems : newsItems.filter(n => n.category === category);
            container.innerHTML = filtered.map(n => `
                <div class="news-card ${n.featured ? 'featured' : ''}">
                    <img class="news-img" src="${n.img}" alt="">
                    <div class="news-content">
                        <span class="news-category">${n.category === 'events' ? '🎯 ИВЕНТ' : n.category === 'updates' ? '⚡ ОБНОВЛЕНИЕ' : '⚠️ ВАЖНОЕ'}</span>
                        <h3 class="news-title">${n.title}</h3>
                        <p class="news-desc">${n.desc}</p>
                        <button class="news-btn" onclick="alert('Функция в разработке')">${n.buttonText}</button>
                    </div>
                </div>
            `).join('');
        }

        function renderFilters() {
            const container = document.getElementById('newsFilters');
            if(!container) return;
            const categories = [
                { id: "all", name: "Все" },
                { id: "events", name: "Ивенты" },
                { id: "updates", name: "Обновления" },
                { id: "important", name: "Важное" }
            ];
            container.innerHTML = categories.map(c => `<button class="filter-btn" data-cat="${c.id}">${c.name}</button>`).join('');
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderNews(btn.dataset.cat);
                };
            });
            document.querySelector('.filter-btn').classList.add('active');
        }

        window.openBuyModal = (name, price) => {
            currentProduct = { name, price };
            document.getElementById('buyProductName').innerText = name;
            document.getElementById('buyPrice').innerText = price.toLocaleString();
            document.getElementById('buyNick').value = '';
            document.getElementById('buyModal').style.display = 'flex';
        };

        document.getElementById('confirmBuyBtn').onclick = async () => {
            const nick = document.getElementById('buyNick').value.trim();
            if(!nick) return alert('Введите ник на сервере');
            if(currentBalance < currentProduct.price) return alert('Недостаточно средств!');
            const newBalance = currentBalance - currentProduct.price;
            await db.collection('users').doc(currentUser.uid).update({ balance: newBalance });
            currentBalance = newBalance;
            document.getElementById('userBalance').innerText = currentBalance.toLocaleString();
            await db.collection('donates').add({ userId: currentUser.uid, username: currentUser.displayName, product: currentProduct.name, price: currentProduct.price, serverNick: nick, date: new Date() });
            await sendEmail({ type: 'ПОКУПКА ПРИВИЛЕГИИ', message: `Куплено: ${currentProduct.name}\nЦена: ${currentProduct.price} ₽\nНик: ${nick}` });
            addLog('ПОКУПКА', currentUser.email, `${currentProduct.name} за ${currentProduct.price} ₽`);
            alert(`✅ Куплено: ${currentProduct.name}!`);
            document.getElementById('buyModal').style.display = 'none';
            loadUserData(currentUser);
        };

        async function loadUserData(user) {
            const doc = await db.collection('users').doc(user.uid).get();
            const data = doc.data();
            const isAdmin = data.isAdmin || (user.email === ADMIN_EMAIL);
            currentBalance = data.balance || 50000;
            document.getElementById('userBalance').innerText = currentBalance.toLocaleString();
            const nameSpan = document.getElementById('profileName');
            nameSpan.innerHTML = '';
            nameSpan.appendChild(document.createTextNode(data.username));
            if(isAdmin) nameSpan.insertAdjacentHTML('beforeend', VERIFIED_SVG);
            document.getElementById('profileInfo').innerHTML = `<p><i class="fas fa-envelope"></i> <strong>Email:</strong> ${user.email}</p><p><i class="fas fa-calendar"></i> <strong>Регистрация:</strong> ${data.registeredAt ? new Date(data.registeredAt).toLocaleDateString() : 'Сегодня'}</p>`;
            
            const donatesSnap = await db.collection('donates').where('userId', '==', user.uid).get();
            const donatesContainer = document.getElementById('donatesContainer');
            if(donatesContainer) {
                donatesContainer.innerHTML = '<h4 style="margin-bottom:10px;">🎁 Мои донаты</h4>';
                if(donatesSnap.empty) donatesContainer.innerHTML += '<p>Нет приобретённых донатов</p>';
                else donatesSnap.forEach(d => donatesContainer.innerHTML += `<span class="donate-badge">${d.data().product}</span> `);
            }
            if(isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
        }

        async function loadNewPlayers() {
            const thirtyMinutesAgo = new Date(Date.now() - 30 * 60 * 1000);
            const snap = await db.collection('users').where('registeredAt', '>=', thirtyMinutesAgo.toISOString()).get();
            const container = document.getElementById('newPlayersList');
            if(!container) return;
            container.innerHTML = snap.docs.map(doc => {
                const p = doc.data();
                return `<div class="player-card"><span><strong>${p.username}</strong> (${p.email})<br>💰 ${p.balance || 0} ₽</span><div class="player-actions"><button onclick="showUserActions('${doc.id}', '${p.username}', '${p.email}')">⚡ ДЕЙСТВИЯ</button></div></div>`;
            }).join('');
        }

        window.showUserActions = (userId, username, email) => {
            const content = `
                <h4>👤 ${username}</h4>
                <button onclick="actionBan('${userId}', '${username}', '${email}')" style="background:#ef4444;">🔨 БАН</button>
                <button onclick="actionUnban('${email}')" style="background:#22c55e;">🔓 РАЗБАН</button>
                <button onclick="actionKick('${userId}', '${username}', '${email}')" style="background:#ff6600;">👢 КИК</button>
                <button onclick="actionGiveDonate('${userId}', '${username}')" style="background:#3b82f6;">🎁 ВЫДАТЬ ДОНАТ</button>
                <button onclick="actionRemoveDonate('${userId}', '${username}')" style="background:#8b5cf6;">🗑️ СНЯТЬ ДОНАТ</button>
            `;
            document.getElementById('userActionsContent').innerHTML = content;
            document.getElementById('userActionsModal').style.display = 'flex';
        };
        window.actionBan = async (userId, username, email) => {
            await db.collection('bans').add({ userId, username, email, reason: "Нарушение", until: null, active: true, moderator: currentUser.email, createdAt: new Date() });
            addLog('БАН', email, username);
            alert(`Бан выдан ${username}`);
            document.getElementById('userActionsModal').style.display = 'none';
        };
        window.actionUnban = async (email) => {
            const snap = await db.collection('bans').where('email', '==', email).where('active', '==', true).get();
            snap.forEach(doc => doc.ref.update({ active: false }));
            addLog('РАЗБАН', email, '');
            alert('Разбан выполнен');
            document.getElementById('userActionsModal').style.display = 'none';
        };
        window.actionKick = async (userId, username, email) => {
            await db.collection('kicks').add({ userId, username, email, reason: "Кик от админа", active: true, moderator: currentUser.email, createdAt: new Date() });
            addLog('КИК', email, username);
            alert(`Кик выдан ${username}`);
            document.getElementById('userActionsModal').style.display = 'none';
        };
        window.actionGiveDonate = async (userId, username) => {
            const donateName = prompt("Название доната:");
            if(!donateName) return;
            await db.collection('donates').add({ userId, username, product: donateName, price: 0, serverNick: username, date: new Date(), givenBy: currentUser.email });
            addLog('ВЫДАЧА ДОНАТА', username, donateName);
            alert(`Донат ${donateName} выдан`);
            document.getElementById('userActionsModal').style.display = 'none';
        };
        window.actionRemoveDonate = async (userId, username) => {
            const snap = await db.collection('donates').where('userId', '==', userId).get();
            snap.forEach(doc => doc.ref.delete());
            addLog('СНЯТИЕ ДОНАТА', username, 'Все донаты');
            alert(`Донаты сняты`);
            document.getElementById('userActionsModal').style.display = 'none';
        };

        async function loadLogs() {
            const snap = await db.collection('logs').orderBy('timestamp', 'desc').limit(50).get();
            document.getElementById('logsList').innerHTML = snap.docs.map(doc => `<div class="log-item">[${new Date(doc.data().timestamp?.toDate()).toLocaleString()}] <strong>${doc.data().action}</strong> → ${doc.data().target}<br>${doc.data().details || ''}</div>`).join('');
        }

        document.getElementById('editNameBtn').onclick = () => document.getElementById('editNameModal').style.display = 'flex';
        document.getElementById('closeEditModal').onclick = () => document.getElementById('editNameModal').style.display = 'none';
        document.getElementById('saveNameBtn').onclick = async () => {
            const newName = document.getElementById('newNameInput').value.trim();
            if(!newName) return alert('Введите новое имя');
            await db.collection('users').doc(currentUser.uid).update({ username: newName });
            await currentUser.updateProfile({ displayName: newName });
            alert('Имя изменено!');
            document.getElementById('editNameModal').style.display = 'none';
            loadUserData(currentUser);
        };
        document.getElementById('changePasswordBtn').onclick = () => document.getElementById('changePasswordModal').style.display = 'flex';
        document.getElementById('closePasswordModal').onclick = () => document.getElementById('changePasswordModal').style.display = 'none';
        document.getElementById('savePasswordBtn').onclick = async () => {
            const oldPass = document.getElementById('oldPasswordInput').value;
            const newPass = document.getElementById('newPasswordInput').value;
            if(!oldPass || !newPass) return alert('Заполните поля');
            if(newPass.length < 6) return alert('Пароль минимум 6 символов');
            try {
                const cred = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPass);
                await currentUser.reauthenticateWithCredential(cred);
                await currentUser.updatePassword(newPass);
                alert('Пароль изменён!');
                document.getElementById('changePasswordModal').style.display = 'none';
            } catch(e) { alert('Ошибка: ' + (e.code === 'auth/wrong-password' ? 'Неверный старый пароль' : e.message)); }
        };
        document.getElementById('doRegisterBtn').onclick = async () => {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const pass = document.getElementById('regPass').value;
            if(!username || !email || !pass) return alert('Заполните все поля');
            if(pass.length < 6) return alert('Пароль минимум 6 символов');
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                await cred.user.updateProfile({ displayName: username });
                await db.collection('users').doc(cred.user.uid).set({ username, email, balance: 50000, isAdmin: (email === ADMIN_EMAIL), registeredAt: new Date().toISOString() });
                document.getElementById('authModal').style.display = 'none';
                alert('✅ Регистрация успешна! Баланс: 50 000 ₽');
            } catch(e) { alert('Ошибка: ' + e.message); }
        };
        document.getElementById('doLoginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value;
            if(!email || !pass) return alert('Введите email и пароль');
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                document.getElementById('authModal').style.display = 'none';
            } catch(e) { alert('Ошибка: ' + e.message); }
        };
        document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); };
        document.getElementById('closeUserActionsModal').onclick = () => document.getElementById('userActionsModal').style.display = 'none';
        document.getElementById('closeBuyModal').onclick = () => document.getElementById('buyModal').style.display = 'none';
        
        document.getElementById('checkAdminPasswordBtn')?.addEventListener('click', () => {
            if(document.getElementById('adminPassword').value === 'website') {
                document.getElementById('adminLoginPanel').style.display = 'none';
                document.getElementById('adminPanelContent').style.display = 'block';
                loadNewPlayers();
                loadLogs();
            } else alert('❌ Неверный ключ!');
        });

        document.querySelectorAll('.menu-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(`${tab.dataset.page}Page`).classList.add('active');
                if(tab.dataset.page === 'profile' && currentUser) loadUserData(currentUser);
                if(tab.dataset.page === 'admin' && currentUser) loadNewPlayers();
            };
        });
        document.querySelectorAll('.tab-auth').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-auth').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('loginPaneAuth').classList.toggle('active', btn.dataset.tab === 'login');
                document.getElementById('registerPaneAuth').classList.toggle('active', btn.dataset.tab === 'register');
            };
        });

        auth.onAuthStateChanged(async (user) => {
            document.getElementById('loadingPage').style.display = 'none';
            if(user) {
                currentUser = user;
                document.getElementById('mainContent').style.display = 'block';
                document.getElementById('authModal').style.display = 'none';
                await loadUserData(user);
                renderShop();
                renderNews();
                renderFilters();
                const doc = await db.collection('users').doc(user.uid).get();
                if(!doc.exists || doc.data().isAdmin === undefined) await db.collection('users').doc(user.uid).update({ isAdmin: (user.email === ADMIN_EMAIL) });
            } else {
                document.getElementById('mainContent').style.display = 'none';
                document.getElementById('authModal').style.display = 'flex';
            }
        });
    </script>
</body>
</html>
