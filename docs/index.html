<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GrifMcPro | Официальный сайт</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        /* [ВСЕ ТВОИ СТИЛИ ОСТАВЬ БЕЗ ИЗМЕНЕНИЙ] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a12;
            --bg-surface: rgba(20,20,35,0.75);
            --accent: #ffd700;
            --accent-dark: #ccaa00;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b5;
            --danger: #ef4444;
            --success: #10b981;
        }
        body { background: linear-gradient(135deg, #0a0a12 0%, #0f0f1a 100%); font-family: 'Montserrat', sans-serif; color: var(--text-primary); min-height: 100vh; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,18,0.95); backdrop-filter: blur(20px); padding: 8px 30px; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), #8b5cf6); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-text { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .balance { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 8px 18px; border-radius: 40px; }
        .balance i, .balance span { color: var(--accent); font-weight: 700; }
        .btn-logout { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .menu-tabs { display: flex; gap: 12px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .menu-tab { background: rgba(25,25,40,0.6); padding: 8px 28px; border-radius: 40px; cursor: pointer; }
        .menu-tab.active, .menu-tab:hover { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #0a0a12; }
        .page { display: none; animation: fadeInUp 0.4s ease; padding-top: 85px; min-height: 100vh; }
        .page.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); justify-content: center; align-items: center; z-index: 1000; }
        .auth-modal { background: linear-gradient(135deg, #181825, #0f0f18); border-radius: 32px; padding: 35px; width: 460px; max-width: 90%; text-align: center; }
        .auth-input { width: 100%; padding: 14px; margin: 10px 0; background: rgba(0,0,0,0.5); border-radius: 40px; border: 1px solid rgba(255,215,0,0.2); color: white; }
        .auth-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border: none; padding: 14px; border-radius: 40px; font-weight: 700; cursor: pointer; color: #0a0a12; }
        .tabs-auth { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        .tab-auth { background: none; border: none; color: var(--text-secondary); padding: 8px 25px; border-radius: 40px; cursor: pointer; }
        .tab-auth.active { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); color: #0a0a12; }
        .tab-pane-auth { display: none; }
        .tab-pane-auth.active { display: block; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 25px; max-width: 1300px; margin: 0 auto; padding: 20px; }
        .product-card { background: var(--bg-surface); backdrop-filter: blur(16px); border-radius: 28px; padding: 25px; text-align: center; cursor: pointer; }
        .buy-btn { background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border: none; padding: 14px; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; }
        .notification-toast { position: fixed; bottom: 25px; left: 25px; background: #1a1a2a; border-left: 5px solid var(--accent); border-radius: 16px; padding: 14px 22px; z-index: 1500; }
        .admin-page { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a12; z-index: 2000; overflow-y: auto; }
        .admin-page.active { display: block; }
    </style>
</head>
<body>

    <div class="site-header">
        <div class="header-content">
            <div class="logo"><div class="logo-icon"><i class="fas fa-crown"></i></div><span class="logo-text">GrifMcPro</span></div>
            <div class="header-right">
                <div class="balance"><i class="fas fa-coins"></i> <span id="userBalance">0</span> ₽</div>
                <button class="btn-logout" id="logoutBtn">Выйти</button>
            </div>
        </div>
        <div class="menu-tabs" id="dynamicMenuTabs"></div>
    </div>

    <div id="homePage" class="page active"><h1 style="text-align:center;margin-top:100px;">Добро пожаловать на GrifMcPro</h1></div>
    <div id="shopPage" class="page"><div class="shop-grid" id="shopGrid"></div></div>
    <div id="profilePage" class="page"><div style="max-width:600px;margin:0 auto;padding:20px;" id="profileContent"></div></div>
    <div id="adminPage" class="page"><div style="padding:20px;"><h1>Админ панель</h1><div id="adminContent"></div></div></div>

    <div id="authModal" class="modal" style="display: flex;">
        <div class="auth-modal">
            <i class="fas fa-crown" style="font-size: 45px; color: var(--accent);"></i>
            <h2 style="margin:20px 0;">GrifMcPro</h2>
            <div class="tabs-auth">
                <button class="tab-auth active" data-tab="login">ВХОД</button>
                <button class="tab-auth" data-tab="register">РЕГИСТРАЦИЯ</button>
            </div>
            <div id="loginPaneAuth" class="tab-pane-auth active">
                <input type="email" id="loginEmail" placeholder="Email" class="auth-input">
                <input type="password" id="loginPass" placeholder="Пароль" class="auth-input">
                <button id="doLoginBtn" class="auth-btn">ВОЙТИ</button>
            </div>
            <div id="registerPaneAuth" class="tab-pane-auth">
                <input type="text" id="regUsername" placeholder="Никнейм" class="auth-input">
                <input type="email" id="regEmail" placeholder="Email" class="auth-input">
                <input type="password" id="regPass" placeholder="Пароль (мин. 6)" class="auth-input">
                <button id="doRegisterBtn" class="auth-btn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
            </div>
        </div>
    </div>

    <div id="buyModal" class="modal">
        <div class="auth-modal">
            <h3 id="buyProductName"></h3>
            <p>Цена: <strong id="buyPrice" style="color:var(--accent);"></strong> ₽</p>
            <input type="text" id="buyNick" placeholder="Ваш ник на сервере" class="auth-input">
            <button id="confirmBuyBtn" class="auth-btn">КУПИТЬ</button>
            <button onclick="document.getElementById('buyModal').style.display='none'" class="auth-btn" style="margin-top:10px;background:#333;">Закрыть</button>
        </div>
    </div>

    <script>
        (function() {
            // FIREBASE КОНФИГ
            const firebaseConfig = {
                apiKey: "AIzaSyCK9vHX-OQIw48SGi8S_8U7pIjq60gahEA",
                authDomain: "siteorgooo.firebaseapp.com",
                projectId: "siteorgooo",
                storageBucket: "siteorgooo.firebasestorage.app",
                messagingSenderId: "891797808455",
                appId: "1:891797808455:web:fa5e94be661dcc87d81862"
            };
            
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const MAIN_ADMIN_EMAIL = "ramonenok@bk.ru";

            let currentUser = null;
            let currentBalance = 0;

            // ТОВАРЫ
            const products = [
                { name: "VIP", price: 500 },
                { name: "PREMIUM", price: 1000 },
                { name: "DELUXE", price: 2500 },
                { name: "LEGEND", price: 5000 }
            ];

            function showNotification(msg, type = 'success') {
                let container = document.getElementById('notifContainer');
                if (!container) {
                    container = document.createElement('div');
                    container.id = 'notifContainer';
                    container.style.position = 'fixed';
                    container.style.bottom = '25px';
                    container.style.left = '25px';
                    container.style.zIndex = '1500';
                    document.body.appendChild(container);
                }
                const notif = document.createElement('div');
                notif.className = `notification-toast`;
                notif.style.borderLeftColor = type === 'error' ? '#ef4444' : '#10b981';
                notif.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
                container.appendChild(notif);
                setTimeout(() => notif.remove(), 4000);
            }

            // ЗАГРУЗКА ПРОФИЛЯ
            async function loadUserProfile(user) {
                if (!user) return;
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data();
                currentBalance = userData?.balance || 0;
                document.getElementById('userBalance').innerText = currentBalance;
                
                const profileContent = document.getElementById('profileContent');
                if (profileContent) {
                    profileContent.innerHTML = `
                        <div style="background:rgba(255,255,255,0.05);border-radius:28px;padding:30px;">
                            <h2>${userData?.username || user.email}</h2>
                            <p>Email: ${user.email}</p>
                            <p>Баланс: ${currentBalance} ₽</p>
                            <p>Зарегистрирован: ${userData?.registeredAt || 'Неизвестно'}</p>
                            <button id="addBalanceBtn" class="buy-btn" style="margin-top:20px;">Пополнить баланс (тест)</button>
                        </div>
                    `;
                    document.getElementById('addBalanceBtn')?.addEventListener('click', async () => {
                        const newBalance = currentBalance + 1000;
                        await db.collection('users').doc(user.uid).update({ balance: newBalance });
                        currentBalance = newBalance;
                        document.getElementById('userBalance').innerText = currentBalance;
                        loadUserProfile(user);
                        showNotification('Баланс пополнен на 1000 ₽');
                    });
                }
            }

            // ЗАГРУЗКА МАГАЗИНА
            function loadShop() {
                const container = document.getElementById('shopGrid');
                if (!container) return;
                container.innerHTML = products.map(p => `
                    <div class="product-card" data-name="${p.name}" data-price="${p.price}">
                        <h3 class="product-name">${p.name}</h3>
                        <div class="price">${p.price} ₽</div>
                        <button class="buy-btn">КУПИТЬ</button>
                    </div>
                `).join('');
                
                document.querySelectorAll('.product-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        if (e.target.classList.contains('buy-btn') || card.classList.contains('product-card')) {
                            const name = card.dataset.name;
                            const price = parseInt(card.dataset.price);
                            document.getElementById('buyProductName').innerText = name;
                            document.getElementById('buyPrice').innerText = price;
                            document.getElementById('buyModal').style.display = 'flex';
                            window.currentBuyProduct = { name, price };
                        }
                    });
                });
            }

            // ПОКУПКА
            async function purchaseProduct(product, serverNick) {
                if (!currentUser) {
                    showNotification('Сначала войдите в аккаунт!', 'error');
                    return false;
                }
                if (currentBalance < product.price) {
                    showNotification('Недостаточно средств!', 'error');
                    return false;
                }
                
                const newBalance = currentBalance - product.price;
                await db.collection('users').doc(currentUser.uid).update({ balance: newBalance });
                currentBalance = newBalance;
                document.getElementById('userBalance').innerText = currentBalance;
                
                // Лог покупки
                await db.collection('purchases').add({
                    type: 'donate',
                    product: product.name,
                    price: product.price,
                    serverNick: serverNick,
                    userEmail: currentUser.email,
                    date: new Date().toISOString(),
                    timestamp: new Date()
                });
                
                showNotification(`Вы купили ${product.name}!`);
                loadUserProfile(currentUser);
                return true;
            }

            // РЕГИСТРАЦИЯ
            async function register(email, password, username) {
                if (password.length < 6) {
                    showNotification('Пароль должен быть минимум 6 символов!', 'error');
                    return false;
                }
                try {
                    const userCred = await auth.createUserWithEmailAndPassword(email, password);
                    await db.collection('users').doc(userCred.user.uid).set({
                        email: email,
                        username: username,
                        balance: 0,
                        registeredAt: new Date().toISOString(),
                        donates: []
                    });
                    showNotification('Регистрация успешна!');
                    return true;
                } catch (error) {
                    showNotification('Ошибка: ' + error.message, 'error');
                    return false;
                }
            }

            // ВХОД
            async function login(email, password) {
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                    showNotification('Вход выполнен!');
                    return true;
                } catch (error) {
                    showNotification('Ошибка: ' + error.message, 'error');
                    return false;
                }
            }

            // ВЫХОД
            async function logout() {
                await auth.signOut();
                currentUser = null;
                document.getElementById('authModal').style.display = 'flex';
                document.querySelector('.site-header').style.display = 'none';
                showNotification('Вы вышли из аккаунта');
            }

            // МЕНЮ
            function renderMenu() {
                const container = document.getElementById('dynamicMenuTabs');
                if (!container) return;
                const isAdmin = currentUser?.email === MAIN_ADMIN_EMAIL;
                container.innerHTML = `
                    <div class="menu-tab active" data-page="home">Главная</div>
                    <div class="menu-tab" data-page="shop">Магазин</div>
                    <div class="menu-tab" data-page="profile">Профиль</div>
                    ${isAdmin ? '<div class="menu-tab" data-page="admin">Админ</div>' : ''}
                `;
                document.querySelectorAll('.menu-tab').forEach(tab => {
                    tab.onclick = () => {
                        document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                        document.getElementById(`${tab.dataset.page}Page`).classList.add('active');
                        if (tab.dataset.page === 'profile' && currentUser) loadUserProfile(currentUser);
                        if (tab.dataset.page === 'admin') loadAdminPanel();
                    };
                });
            }

            // АДМИН ПАНЕЛЬ
            async function loadAdminPanel() {
                const container = document.getElementById('adminContent');
                if (!container) return;
                
                // Получаем логи покупок
                const purchasesSnap = await db.collection('purchases').orderBy('timestamp', 'desc').limit(20).get();
                let purchasesHtml = '<h3>Логи покупок:</h3>';
                purchasesSnap.forEach(doc => {
                    const p = doc.data();
                    purchasesHtml += `
                        <div style="background:rgba(255,255,255,0.05);margin:10px 0;padding:10px;border-radius:10px;">
                            <strong>${p.product}</strong> | ${p.price} ₽<br>
                            Ник в игре: ${p.serverNick || '-'}<br>
                            Email: ${p.userEmail}<br>
                            Дата: ${new Date(p.date).toLocaleString()}
                        </div>
                    `;
                });
                
                // Получаем всех пользователей
                const usersSnap = await db.collection('users').get();
                let usersHtml = '<h3>Пользователи:</h3>';
                usersSnap.forEach(doc => {
                    const u = doc.data();
                    usersHtml += `<div style="margin:5px 0;">${u.username} | ${u.email} | Баланс: ${u.balance} ₽</div>`;
                });
                
                container.innerHTML = `
                    <div style="display:grid;gap:20px;">
                        <div style="background:rgba(255,255,255,0.05);padding:20px;border-radius:20px;">
                            <h3>Выдать монеты</h3>
                            <input type="text" id="adminGiveNick" placeholder="Email пользователя" class="auth-input">
                            <input type="number" id="adminGiveAmount" placeholder="Сумма" class="auth-input">
                            <button id="adminGiveCoinsBtn" class="auth-btn">ВЫДАТЬ</button>
                        </div>
                        <div style="background:rgba(255,255,255,0.05);padding:20px;border-radius:20px;">
                            ${purchasesHtml}
                        </div>
                        <div style="background:rgba(255,255,255,0.05);padding:20px;border-radius:20px;">
                            ${usersHtml}
                        </div>
                    </div>
                `;
                
                document.getElementById('adminGiveCoinsBtn')?.addEventListener('click', async () => {
                    const email = document.getElementById('adminGiveNick').value;
                    const amount = parseInt(document.getElementById('adminGiveAmount').value);
                    if (!email || isNaN(amount)) {
                        showNotification('Введите email и сумму!', 'error');
                        return;
                    }
                    const usersSnap2 = await db.collection('users').where('email', '==', email).get();
                    if (usersSnap2.empty) {
                        showNotification('Пользователь не найден!', 'error');
                        return;
                    }
                    const userDoc = usersSnap2.docs[0];
                    const currentBal = userDoc.data().balance || 0;
                    await userDoc.ref.update({ balance: currentBal + amount });
                    showNotification(`Выдано ${amount} монет пользователю ${email}`);
                    loadAdminPanel();
                });
            }

            // ОБРАБОТЧИКИ
            document.getElementById('doLoginBtn')?.addEventListener('click', async () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPass').value;
                if (await login(email, pass)) {
                    document.getElementById('authModal').style.display = 'none';
                    document.querySelector('.site-header').style.display = 'block';
                }
            });
            
            document.getElementById('doRegisterBtn')?.addEventListener('click', async () => {
                const username = document.getElementById('regUsername').value;
                const email = document.getElementById('regEmail').value;
                const pass = document.getElementById('regPass').value;
                if (await register(email, pass, username)) {
                    document.getElementById('authModal').style.display = 'none';
                    document.querySelector('.site-header').style.display = 'block';
                }
            });
            
            document.getElementById('logoutBtn')?.addEventListener('click', logout);
            
            document.getElementById('confirmBuyBtn')?.addEventListener('click', async () => {
                const serverNick = document.getElementById('buyNick').value;
                if (!serverNick) {
                    showNotification('Введите ник на сервере!', 'error');
                    return;
                }
                if (window.currentBuyProduct) {
                    await purchaseProduct(window.currentBuyProduct, serverNick);
                    document.getElementById('buyModal').style.display = 'none';
                    document.getElementById('buyNick').value = '';
                }
            });
            
            // ТАБЫ В МОДАЛКЕ
            document.querySelectorAll('.tab-auth').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab-auth').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    document.querySelectorAll('.tab-pane-auth').forEach(p => p.classList.remove('active'));
                    document.getElementById(`${tab.dataset.tab}PaneAuth`).classList.add('active');
                });
            });
            
            // СЛУШАЕМ АВТОРИЗАЦИЮ
            auth.onAuthStateChanged(async (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('authModal').style.display = 'none';
                    document.querySelector('.site-header').style.display = 'block';
                    await loadUserProfile(user);
                    renderMenu();
                    loadShop();
                } else {
                    currentUser = null;
                    document.getElementById('authModal').style.display = 'flex';
                    document.querySelector('.site-header').style.display = 'none';
                }
            });
            
            loadShop();
        })();
    </script>
</body>
</html>
