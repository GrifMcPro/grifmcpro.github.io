<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GrifLauncher | Full Admin System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0a12;
            --bg-surface: rgba(20,20,35,0.75);
            --accent: #ffd700;
            --accent-glow: rgba(255,215,0,0.2);
            --purple: #8b5cf6;
            --danger: #ef4444;
            --text-primary: #ffffff;
            --text-muted: #6a6a80;
            --border-color: rgba(255,215,0,0.12);
            --radius-2xl: 28px;
        }
        body { background: linear-gradient(135deg, #0a0a12 0%, #0f0f1a 100%); font-family: 'Montserrat', sans-serif; color: var(--text-primary); min-height: 100vh; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-5px); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rgbTextAnim { 0% { color: #ff0000; text-shadow: 0 0 5px #ff0000; } 25% { color: #00ff00; } 50% { color: #0000ff; } 75% { color: #ff00ff; } 100% { color: #ff0000; } }
        @keyframes rgbBorderAnim { 0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; } 25% { border-color: #00ff00; } 50% { border-color: #0000ff; } 75% { border-color: #ff00ff; } 100% { border-color: #ff0000; } }
        @keyframes rainbowRotate { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        .rgb-text-animation { animation: rgbTextAnim 3s infinite; }
        .rgb-border-animation { animation: rgbBorderAnim 3s infinite; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #151520; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* ХЕДЕР И МЕНЮ */
        .site-header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,18,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); padding: 6px 30px; }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--purple)); border-radius: 8px; display: flex; align-items: center; justify-content: center; animation: float 3s ease infinite; }
        .logo-icon i { font-size: 16px; color: #0a0a12; }
        .logo-text { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 800; background: linear-gradient(135deg, #fff, var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .balance { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.5); padding: 5px 14px; border-radius: 40px; border: 1px solid rgba(255,215,0,0.2); }
        .balance i, .balance span { color: var(--accent); font-weight: 700; }
        .btn-logout { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); padding: 5px 16px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 12px; }
        .menu-tabs { display: flex; gap: 8px; justify-content: center; margin-top: 6px; flex-wrap: wrap; }
        .menu-tab { background: rgba(25,25,40,0.6); backdrop-filter: blur(8px); border: 1px solid var(--border-color); padding: 5px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 5px; color: var(--text-primary); transition: 0.2s; }
        .menu-tab.active, .menu-tab:hover { background: linear-gradient(135deg, var(--accent), #ccaa00); color: #0a0a12; border-color: transparent; box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .page { display: none; animation: fadeInUp 0.3s ease; }
        .page.active { display: block; }
        #homePage, #shopPage, #profilePage, #adminPage { padding-top: 75px; min-height: 100vh; }

        /* ГЛАВНАЯ ТАЙМЕР */
        .hero-timer { min-height: calc(100vh - 75px); display: flex; align-items: center; justify-content: center; text-align: center; }
        .timer-title { font-family: 'Orbitron', monospace; font-size: 48px; font-weight: 800; margin-bottom: 50px; }
        .countdown-wrapper { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .countdown-block { background: rgba(0,0,0,0.5); backdrop-filter: blur(20px); border-radius: var(--radius-2xl); padding: 30px 40px; min-width: 130px; border: 1px solid rgba(255,215,0,0.2); transition: 0.3s; }
        .countdown-number { font-family: 'Orbitron', monospace; font-size: 56px; font-weight: 800; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .countdown-label { font-size: 14px; color: #a0a0b5; margin-top: 10px; }

        /* МАГАЗИН */
        .shop-section { max-width: 1300px; margin: 0 auto; padding: 20px; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 25px; }
        .product-card { background: var(--bg-surface); backdrop-filter: blur(16px); border-radius: var(--radius-2xl); padding: 25px; text-align: center; border: 1px solid var(--border-color); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 0 15px rgba(255,215,0,0.2); }
        .price { font-size: 28px; font-weight: 800; color: var(--accent); margin: 12px 0; font-family: 'Orbitron', monospace; }
        .buy-btn { background: linear-gradient(135deg, var(--accent), #ccaa00); border: none; padding: 12px; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; color: #0a0a12; }

        /* ПРОФИЛЬ И ГАЛОЧКИ - КРАСИВЫЕ АНИМИРОВАННЫЕ */
        .badge-icon { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; border-radius: 50%; margin-left: 4px; }
        .badge-icon i { font-size: 10px; color: white; }
        .badge-blue { background: #3b82f6; }
        .badge-red { background: #ef4444; }
        .badge-gold { background: #ffd700; }
        .badge-rainbow { background: linear-gradient(135deg, #ff0000, #ff8800, #ffff00, #00ff00, #0088ff, #8800ff, #ff00ff); background-size: 200% 200%; animation: rainbowRotate 2s ease infinite; }
        .badge-rgb { background: #1a1a2a; border: 2px solid; animation: rgbBorderAnim 3s infinite; }
        .badge-crown { background: linear-gradient(135deg, #7c3aed, #a855f7); width: auto; border-radius: 20px; padding: 2px 10px; animation: pulse 1.5s infinite; }
        .badge-crown i { color: #ffd700; font-size: 12px; }
        .badge-diamond { background: linear-gradient(135deg, #00ffff, #0088ff); }
        .badge-star { background: linear-gradient(135deg, #ffd700, #ff8800); }
        .badge-game { background: linear-gradient(135deg, #ff00ff, #8800ff); }
        .badge-fire { background: linear-gradient(135deg, #ff4400, #ff0000); animation: pulse 1s infinite; }
        .badge-mythic { background: linear-gradient(135deg, #a855f7, #7c3aed); }
        .badge-cosmic { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .badge-ice { background: linear-gradient(135deg, #ec4899, #db2777); }
        .badge-shadow { background: #1f2937; border: 1px solid #4b5563; }
        .badge-light { background: #f3f4f6; }
        .badge-light i { color: #1a1a1a; }
        .badge-dark { background: #111827; }
        .badge-nature { background: linear-gradient(135deg, #10b981, #059669); }
        .badge-purple { background: #8b5cf6; }
        .badge-teal { background: #14b8a6; }
        
        /* АДМИНКА */
        .admin-section { max-width: 950px; margin: 0 auto; padding: 20px; }
        .admin-panel { background: var(--bg-surface); backdrop-filter: blur(16px); border-radius: var(--radius-2xl); padding: 25px; }
        .admin-block { background: rgba(0,0,0,0.3); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .admin-input, .admin-select { width: 100%; padding: 8px 12px; margin: 5px 0; background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); border-radius: 40px; color: white; }
        .admin-btn { background: linear-gradient(135deg, var(--accent), #ccaa00); border: none; padding: 8px; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 6px; color: #0a0a12; }
        .players-list { max-height: 220px; overflow-y: auto; }
        .player-card { background: rgba(0,0,0,0.35); border-radius: 16px; padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(20px); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content, .auth-modal { background: #181825; border-radius: 28px; padding: 30px; width: 420px; max-width: 90%; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 8px 0; background: rgba(0,0,0,0.5); border-radius: 40px; border: 1px solid var(--border-color); color: white; }
        .auth-btn { width: 100%; background: linear-gradient(135deg, var(--accent), #ccaa00); border: none; padding: 12px; border-radius: 40px; font-weight: 700; cursor: pointer; }
        .admin-only { display: none; }
        .toast-notification { position: fixed; bottom: 20px; right: 20px; background: #181825; border-left: 3px solid var(--accent); padding: 12px 20px; border-radius: 16px; z-index: 1000; animation: fadeInUp 0.3s ease; }
        @media (max-width: 768px) { .countdown-number { font-size: 32px; } }
    </style>
</head>
<body>
    <div class="site-header">
        <div class="header-content">
            <div class="logo"><div class="logo-icon"><i class="fas fa-crown"></i></div><span class="logo-text">GRIFLAUNCHER</span></div>
            <div class="header-right"><div class="balance"><i class="fas fa-coins"></i> <span id="userBalance">0</span> ₽</div><button class="btn-logout" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button></div>
        </div>
        <div class="menu-tabs" id="dynamicMenuTabs"></div>
    </div>

    <div id="homePage" class="page active"><div class="hero-timer"><div class="timer-container"><div class="timer-title" id="eventTitle">ДО ОТКРЫТИЯ СЕЗОНА</div><div class="countdown-wrapper"><div class="countdown-block"><div class="countdown-number" id="days">0</div><div class="countdown-label">Дней</div></div><div class="countdown-block"><div class="countdown-number" id="hours">0</div><div class="countdown-label">Часов</div></div><div class="countdown-block"><div class="countdown-number" id="minutes">0</div><div class="countdown-label">Минут</div></div><div class="countdown-block"><div class="countdown-number" id="seconds">0</div><div class="countdown-label">Секунд</div></div></div><div id="eventDesc" style="margin-top: 20px; color: var(--text-muted);"></div></div></div></div>
    <div id="shopPage" class="page"><div class="shop-section"><div class="shop-grid" id="shopGrid"></div><button class="buy-btn test-server-btn" id="testServerBtn" style="width: auto; margin-top: 30px; padding: 12px 40px;">🎮 ЗАКАЗАТЬ ТЕСТ-СЕРВЕР</button></div></div>
    <div id="profilePage" class="page"><div class="profile-section"><div class="profile-card"><div class="profile-avatar"><i class="fas fa-user"></i></div><div class="profile-name" id="profileName"></div><div class="profile-info" id="profileInfo"></div><div class="profile-info"><p><i class="fas fa-tag"></i> <strong>Тег:</strong> <span id="userTag"></span></p></div><div id="donatesContainer" class="donates-list"></div><div class="profile-actions"><button id="editNameBtn" class="profile-btn">Сменить имя</button><button id="changePasswordBtn" class="profile-btn">Сменить пароль</button></div></div></div></div>
    <div id="adminPage" class="page"><div class="admin-section"><div class="admin-panel"><div class="admin-title">👑 АДМИН-ПАНЕЛЬ</div><div id="adminLoginPanel"><input type="password" id="adminPassword" placeholder="Ключ доступа (website)" class="admin-input"><button id="checkAdminPasswordBtn" class="admin-btn">ВОЙТИ</button></div><div id="adminPanelContent" style="display: none;"><div class="admin-block"><h3>⚙️ НАСТРОЙКА ТАЙМЕРА</h3><input type="text" id="timerEventName" placeholder="Название события" class="admin-input"><textarea id="timerEventDesc" rows="2" placeholder="Описание" class="admin-input"></textarea><input type="datetime-local" id="timerTargetDate" class="admin-input"><div style="display: flex; gap: 8px;"><button id="applyTimerRgbText" class="admin-btn" style="background:#3b82f6;">RGB Текст</button><button id="applyTimerRgbBorder" class="admin-btn" style="background:#ec4899;">RGB Рамка</button></div><button id="updateTimerBtn" class="admin-btn">💾 СОХРАНИТЬ</button></div><div class="admin-block"><h3>📢 РАССЫЛКА</h3><textarea id="broadcastMsg" rows="2" class="admin-input"></textarea><button id="sendBroadcastBtn" class="admin-btn">ОТПРАВИТЬ ВСЕМ</button></div><div class="admin-block"><h3>👥 ПОСЛЕДНИЕ 5 МИН</h3><div id="recentUsersList" class="players-list"></div></div><div class="admin-block"><h3>🛡️ МОДЕРАТОРЫ</h3><input type="text" id="moderatorNick" placeholder="Никнейм" class="admin-input"><button id="addModeratorBtn" class="admin-btn">ДОБАВИТЬ</button><div id="moderatorsList" class="players-list"></div></div><div class="admin-block"><h3>🎫 ПРОКРУТКИ</h3><input type="text" id="wheelUserNick" placeholder="Никнейм" class="admin-input"><button id="giveSpinBtn" class="admin-btn">ВЫДАТЬ</button></div><div class="admin-block"><h3>🏷️ ГАЛОЧКИ (20 КРАСИВЫХ ВИДОВ)</h3><input type="text" id="badgeNick" placeholder="Никнейм" class="admin-input"><select id="badgeType" class="admin-select"><option value="blue">🔵 Синяя</option><option value="red">🔴 Красная</option><option value="gold">🟡 Золотая</option><option value="rainbow">🌈 Радужная</option><option value="rgb">✨ RGB</option><option value="crown">👑 Корона</option><option value="diamond">💎 Алмазная</option><option value="star">⭐ Звездная</option><option value="game">🎮 Игровая</option><option value="fire">🔥 Огненная</option><option value="mythic">🔮 Мифическая</option><option value="cosmic">🌌 Космическая</option><option value="ice">❄️ Ледяная</option><option value="shadow">🌑 Теневая</option><option value="light">✨ Светлая</option><option value="dark">🖤 Тёмная</option><option value="nature">🌿 Природная</option><option value="purple">🟣 Фиолетовая</option><option value="teal">🔷 Бирюзовая</option></select><button id="giveBadgeBtn" class="admin-btn">ВЫДАТЬ</button><button id="removeBadgeBtn" class="admin-btn">СНЯТЬ</button></div><div class="admin-block"><h3>💰 МОНЕТЫ</h3><input type="text" id="giveNick" placeholder="Никнейм" class="admin-input"><input type="number" id="giveAmount" placeholder="Сумма" class="admin-input"><button id="giveCoinsBtn" class="admin-btn">ВЫДАТЬ</button><button id="globalGiveBtn" class="admin-btn">ВСЕМ</button></div><div class="admin-block"><h3>🔨 БАН / РАЗБАН</h3><input type="text" id="banNick" placeholder="Никнейм" class="admin-input"><input type="text" id="moderatorName" placeholder="Модератор" class="admin-input"><textarea id="banReason" rows="2" placeholder="Причина" class="admin-input"></textarea><select id="banDuration"><option value="1">1 час</option><option value="forever">Навсегда</option></select><button id="banUserBtn" class="admin-btn">ЗАБАНИТЬ</button><button id="unbanUserBtn" class="admin-btn">РАЗБАНИТЬ</button></div><div class="admin-block"><h3>📊 СТАТИСТИКА</h3><div id="statsList" class="players-list"></div></div></div></div></div></div>

    <div id="authModal" class="modal" style="display: flex;"><div class="auth-modal"><i class="fas fa-crown" style="font-size: 40px; color: var(--accent);"></i><h2>GRIFLAUNCHER</h2><input type="email" id="loginEmail" placeholder="Email" class="auth-input"><input type="password" id="loginPass" placeholder="Пароль" class="auth-input"><button id="doLoginBtn" class="auth-btn">ВОЙТИ</button><hr style="margin: 15px 0;"><input type="text" id="regUsername" placeholder="Никнейм" class="auth-input"><input type="email" id="regEmail" placeholder="Email" class="auth-input"><input type="password" id="regPass" placeholder="Пароль (мин. 6)" class="auth-input"><button id="doRegisterBtn" class="auth-btn">ЗАРЕГИСТРИРОВАТЬСЯ</button></div></div>
    <div id="buyModal" class="modal"><div class="modal-content"><h3 id="buyProductName"></h3><p>Цена: <strong id="buyPrice"></strong> ₽</p><input type="text" id="buyNick" placeholder="Ник на сервере"><input type="text" id="buySiteNick" placeholder="Ник на сайте"><button id="confirmBuyBtn" class="admin-btn">КУПИТЬ</button></div></div>
    <div id="editNameModal" class="modal"><div class="modal-content"><h3>Сменить имя</h3><input type="text" id="newNameInput"><button id="saveNameBtn" class="admin-btn">Сохранить</button></div></div>
    <div id="changePasswordModal" class="modal"><div class="modal-content"><h3>Сменить пароль</h3><input type="password" id="oldPasswordInput" placeholder="Старый пароль"><input type="password" id="newPasswordInput" placeholder="Новый пароль"><button id="savePasswordBtn" class="admin-btn">Сохранить</button></div></div>

    <script>
        (function(){
            const firebaseConfig = {
                apiKey: "AIzaSyCK9vHX-OQIw48SGi8S_8U7pIjq60gahEA",
                authDomain: "siteorgooo.firebaseapp.com",
                projectId: "siteorgooo",
                storageBucket: "siteorgooo.firebasestorage.app",
                messagingSenderId: "891797808455",
                appId: "1:891797808455:web:fa5e94be661dcc87d81862"
            };
            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const db = firebase.firestore();
            const MAIN_ADMIN_EMAIL = "ramonenok@bk.ru";
            let currentUser = null, currentBalance = 0, currentProduct = null, moderatorsList = [], timerInterval = null;

            function showToast(msg, isError=false){ let d=document.createElement('div'); d.className='toast-notification'; d.innerHTML=`<i class="fas ${isError?'fa-exclamation-triangle':'fa-check-circle'}"></i> ${msg}`; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }
            
            function getBadgeHtml(type){
                if(!type) return '';
                const icons={blue:'fa-check',red:'fa-check',gold:'fa-check',rainbow:'fa-star',rgb:'fa-magic',crown:'fa-crown',diamond:'fa-gem',star:'fa-star',game:'fa-gamepad',fire:'fa-fire',mythic:'fa-dragon',cosmic:'fa-meteor',ice:'fa-snowflake',shadow:'fa-moon',light:'fa-sun',dark:'fa-moon',nature:'fa-leaf',purple:'fa-gem',teal:'fa-water'};
                return `<span class="badge-icon badge-${type}"><i class="fas ${icons[type]||'fa-check'}"></i></span>`;
            }
            
            function renderMenu(){
                const c=document.getElementById('dynamicMenuTabs');
                if(!c) return;
                const isAdmin=currentUser?.email===MAIN_ADMIN_EMAIL;
                c.innerHTML=`<div class="menu-tab active" data-page="home">🏠 Главная</div><div class="menu-tab" data-page="shop">🛒 Магазин</div><div class="menu-tab" data-page="profile">👤 Профиль</div><div class="menu-tab admin-only" data-page="admin">👑 Админ</div>`;
                document.querySelectorAll('.menu-tab').forEach(t=>{ t.onclick=()=>{ document.querySelectorAll('.menu-tab').forEach(x=>x.classList.remove('active')); t.classList.add('active'); document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(`${t.dataset.page}Page`).classList.add('active'); if(t.dataset.page==='admin'){ loadRecentUsers(); loadModerators(); loadStats(); } }; });
                if(currentUser?.email===MAIN_ADMIN_EMAIL) document.querySelectorAll('.admin-only').forEach(el=>el.style.display='block');
            }
            
            // ТАЙМЕР
            function startTimer(targetDate, eventName, eventDesc){
                if(timerInterval) clearInterval(timerInterval);
                document.getElementById('eventTitle').innerText=eventName||'ДО ОТКРЫТИЯ СЕЗОНА';
                document.getElementById('eventDesc').innerHTML=eventDesc||'';
                timerInterval=setInterval(()=>{ let diff=new Date(targetDate)-new Date(); if(diff<=0){ document.getElementById('days').innerText='0'; document.getElementById('hours').innerText='0'; document.getElementById('minutes').innerText='0'; document.getElementById('seconds').innerText='0'; }else{ document.getElementById('days').innerText=Math.floor(diff/86400000); document.getElementById('hours').innerText=Math.floor((diff%86400000)/3600000); document.getElementById('minutes').innerText=Math.floor((diff%3600000)/60000); document.getElementById('seconds').innerText=Math.floor((diff%60000)/1000); } },1000);
            }
            async function loadTimer(){ let doc=await db.collection('settings').doc('timer').get(); if(doc.exists && doc.data().targetDate){ let target=doc.data().targetDate.toDate?doc.data().targetDate.toDate():new Date(doc.data().targetDate); startTimer(target,doc.data().eventName,doc.data().eventDesc); if(document.getElementById('timerEventName')){ document.getElementById('timerEventName').value=doc.data().eventName||''; document.getElementById('timerEventDesc').value=doc.data().eventDesc||''; document.getElementById('timerTargetDate').value=target.toISOString().slice(0,16); } }else{ let def=new Date(); def.setDate(def.getDate()+7); startTimer(def,"ДО ОТКРЫТИЯ СЕЗОНА",""); } }
            async function updateTimer(name,desc,date){ await db.collection('settings').doc('timer').set({eventName:name, eventDesc:desc, targetDate:new Date(date)}); startTimer(new Date(date),name,desc); showToast('✅ Таймер обновлён!'); }
            
            // АДМИН ФУНКЦИИ
            async function loadModerators(){ let doc=await db.collection('settings').doc('moderators').get(); moderatorsList=doc.exists?doc.data().list||[]:[]; document.getElementById('moderatorsList').innerHTML=moderatorsList.map(m=>`<div class="player-card">${m.nick} <button onclick="window.removeModerator('${m.email}')" style="background:#ef4444;">Удалить</button></div>`).join(''); }
            window.removeModerator=async(email)=>{ moderatorsList=moderatorsList.filter(m=>m.email!==email); await db.collection('settings').doc('moderators').set({list:moderatorsList}); loadModerators(); };
            async function loadRecentUsers(){ let ago=new Date(Date.now()-5*60*1000); let snap=await db.collection('users').where('registeredAt','>=',ago.toISOString()).orderBy('registeredAt','desc').get(); document.getElementById('recentUsersList').innerHTML=snap.docs.map(d=>`<div class="player-card">${d.data().username}<br>${d.data().email}<br>💰 ${d.data().balance}₽</div>`).join('')||'Нет новых'; }
            async function loadStats(){ let users=await db.collection('users').get(); document.getElementById('statsList').innerHTML=`<div>👥 Игроков: ${users.size}</div><div>💰 Общий баланс: ${users.docs.reduce((s,d)=>s+(d.data().balance||0),0)}₽</div>`; }
            async function giveCoins(nick,amount){ let snap=await db.collection('users').where('username','==',nick).get(); if(snap.empty) return showToast('Не найден',true); await snap.docs[0].ref.update({balance:(snap.docs[0].data().balance||0)+amount}); showToast(`✅ Выдано ${amount} ₽`); if(currentUser.uid===snap.docs[0].id) currentBalance+=amount; }
            async function giveBadge(nick,type){ let snap=await db.collection('users').where('username','==',nick).get(); if(snap.empty) return; await snap.docs[0].ref.update({badge:type}); showToast(`✅ Галочка выдана ${nick}`); if(currentUser.uid===snap.docs[0].id) document.getElementById('profileName').innerHTML=snap.docs[0].data().username+getBadgeHtml(type); }
            async function giveSpin(nick){ let snap=await db.collection('users').where('username','==',nick).get(); if(snap.empty) return; await snap.docs[0].ref.update({wheelSpins:(snap.docs[0].data().wheelSpins||0)+1}); showToast(`✅ Прокрутка выдана`); }
            async function giveCoinsAll(amount){ let snap=await db.collection('users').get(); for(let doc of snap.docs) await doc.ref.update({balance:(doc.data().balance||0)+amount}); showToast(`✅ Всем выдано ${amount} ₽`); if(currentUser) currentBalance+=amount; }
            async function banUser(nick, reason, duration, mod){ let snap=await db.collection('users').where('username','==',nick).get(); if(snap.empty) return; let user=snap.docs[0]; let until=duration==='forever'?null:new Date(Date.now()+parseInt(duration)*3600000); await db.collection('bans').add({userId:user.id, username:nick, email:user.data().email, reason, until, active:true, moderator:mod}); showToast(`✅ ${nick} забанен`); if(currentUser.uid===user.id) setTimeout(()=>auth.signOut(),2000); }
            async function unbanUser(nick){ let snap=await db.collection('users').where('username','==',nick).get(); if(snap.empty) return; let bans=await db.collection('bans').where('email','==',snap.docs[0].data().email).where('active','==',true).get(); for(let b of bans.docs) await b.ref.update({active:false}); showToast(`✅ ${nick} разбанен`); }
            async function sendBroadcast(msg){ let users=await db.collection('users').get(); for(let u of users.docs) await db.collection('chats').doc('creator').collection('messages').add({ from:"system", fromName:"📢 GrifLauncher", to:u.id, text:`🔔 ${msg}`, timestamp:new Date() }); showToast(`✅ Рассылка отправлена ${users.size} пользователям`); }
            
            // МАГАЗИН И ПОЛЬЗОВАТЕЛЬ
            const privileges = [{name:"Премиум",price:1000,icon:"fa-crown"},{name:"Админ",price:20000,icon:"fa-user-tie"},{name:"Создатель",price:100000,icon:"fa-crown"}];
            function renderShop(){ document.getElementById('shopGrid').innerHTML=privileges.map(p=>`<div class="product-card"><div class="product-icon"><i class="fas ${p.icon}"></i></div><div class="product-name">${p.name}</div><div class="price">${p.price.toLocaleString()} ₽</div><button class="buy-btn" onclick="window.openBuyModal('${p.name}',${p.price})">КУПИТЬ</button></div>`).join(''); }
            window.openBuyModal=(n,p)=>{ currentProduct={name:n,price:p}; document.getElementById('buyProductName').innerText=n; document.getElementById('buyPrice').innerText=p; document.getElementById('buyModal').style.display='flex'; };
            async function purchaseProduct(product, serverNick, siteNick){ if(currentBalance<product.price) return showToast('Недостаточно средств',true); await db.collection('users').doc(currentUser.uid).update({balance:currentBalance-product.price}); await db.collection('donates').add({userId:currentUser.uid, product:product.name, price:product.price}); currentBalance-=product.price; document.getElementById('userBalance').innerText=currentBalance; showToast(`✅ Куплено ${product.name}!`); }
            async function loadUserData(user){ let doc=await db.collection('users').doc(user.uid).get(); let data=doc.data(); if(!data){ await db.collection('users').doc(user.uid).set({username:user.displayName||user.email.split('@')[0], email:user.email, balance:50000, registeredAt:new Date().toISOString(), tag:`#${user.displayName?.substring(0,4)||'user'}`, badge:user.email===MAIN_ADMIN_EMAIL?'crown':null}); currentBalance=50000; }else{ currentBalance=data.balance||50000; } document.getElementById('userBalance').innerText=currentBalance; document.getElementById('profileName').innerHTML=(data?.username||user.displayName)+getBadgeHtml(data?.badge); document.getElementById('profileInfo').innerHTML=`<p><i class="fas fa-envelope"></i> ${user.email}</p>`; document.getElementById('userTag').innerHTML=data?.tag||'#unknown'; db.collection('donates').where('userId','==',user.uid).onSnapshot(snap=>{ let c=document.getElementById('donatesContainer'); if(c){ c.innerHTML=''; snap.forEach(d=>c.innerHTML+=`<span class="donate-tag">${d.data().product}</span>`); if(snap.empty)c.innerHTML='<span>Нет покупок</span>'; } }); if(user.email===MAIN_ADMIN_EMAIL) document.querySelectorAll('.admin-only').forEach(el=>el.style.display='block'); }

            function bindButtons(){
                document.getElementById('doLoginBtn').onclick=async()=>{ try{ await auth.signInWithEmailAndPassword(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); document.getElementById('authModal').style.display='none'; }catch(e){ showToast(e.message,true); } };
                document.getElementById('doRegisterBtn').onclick=async()=>{ let u=document.getElementById('regUsername').value, e=document.getElementById('regEmail').value, p=document.getElementById('regPass').value; if(p.length<6) return showToast('Пароль мин 6',true); try{ let cred=await auth.createUserWithEmailAndPassword(e,p); await cred.user.updateProfile({displayName:u}); await db.collection('users').doc(cred.user.uid).set({username:u, email:e, balance:50000, registeredAt:new Date().toISOString(), tag:`#${u.substring(0,4)}`}); showToast('✅ Регистрация успешна!'); }catch(e){ showToast(e.message,true); } };
                document.getElementById('logoutBtn').onclick=()=>auth.signOut();
                document.getElementById('confirmBuyBtn').onclick=async()=>{ await purchaseProduct(currentProduct, document.getElementById('buyNick').value, document.getElementById('buySiteNick').value); document.getElementById('buyModal').style.display='none'; };
                document.getElementById('editNameBtn').onclick=()=>document.getElementById('editNameModal').style.display='flex';
                document.getElementById('saveNameBtn').onclick=async()=>{ let newName=document.getElementById('newNameInput').value; if(newName){ await db.collection('users').doc(currentUser.uid).update({username:newName}); await currentUser.updateProfile({displayName:newName}); showToast('Имя изменено!'); document.getElementById('editNameModal').style.display='none'; loadUserData(currentUser); } };
                document.getElementById('changePasswordBtn').onclick=()=>document.getElementById('changePasswordModal').style.display='flex';
                document.getElementById('savePasswordBtn').onclick=async()=>{ try{ let cred=firebase.auth.EmailAuthProvider.credential(currentUser.email, document.getElementById('oldPasswordInput').value); await currentUser.reauthenticateWithCredential(cred); await currentUser.updatePassword(document.getElementById('newPasswordInput').value); showToast('Пароль изменён!'); document.getElementById('changePasswordModal').style.display='none'; }catch(e){ showToast('Неверный пароль',true); } };
                document.getElementById('checkAdminPasswordBtn').onclick=()=>{ if(document.getElementById('adminPassword').value==='website'){ document.getElementById('adminLoginPanel').style.display='none'; document.getElementById('adminPanelContent').style.display='block'; loadRecentUsers(); loadModerators(); loadStats(); }else showToast('❌ Неверный ключ!',true); };
                document.getElementById('addModeratorBtn').onclick=async()=>{ let nick=document.getElementById('moderatorNick').value; let snap=await db.collection('users').where('username','==',nick).get(); if(snap.empty) return showToast('Не найден',true); let data=snap.docs[0].data(); if(moderatorsList.some(m=>m.email===data.email)) return showToast('Уже есть',true); moderatorsList.push({nick:data.username, email:data.email}); await db.collection('settings').doc('moderators').set({list:moderatorsList}); loadModerators(); showToast(`Модератор ${nick} добавлен`); };
                document.getElementById('giveBadgeBtn').onclick=()=>giveBadge(document.getElementById('badgeNick').value, document.getElementById('badgeType').value);
                document.getElementById('removeBadgeBtn').onclick=()=>giveBadge(document.getElementById('badgeNick').value, null);
                document.getElementById('giveCoinsBtn').onclick=()=>giveCoins(document.getElementById('giveNick').value, parseInt(document.getElementById('giveAmount').value));
                document.getElementById('globalGiveBtn').onclick=()=>{ let amt=parseInt(prompt('Сумма для всех:')); if(amt) giveCoinsAll(amt); };
                document.getElementById('giveSpinBtn').onclick=()=>giveSpin(document.getElementById('wheelUserNick').value);
                document.getElementById('banUserBtn').onclick=()=>banUser(document.getElementById('banNick').value, document.getElementById('banReason').value, document.getElementById('banDuration').value, document.getElementById('moderatorName').value);
                document.getElementById('unbanUserBtn').onclick=()=>unbanUser(document.getElementById('banNick').value);
                document.getElementById('sendBroadcastBtn').onclick=()=>sendBroadcast(document.getElementById('broadcastMsg').value);
                document.getElementById('updateTimerBtn').onclick=()=>updateTimer(document.getElementById('timerEventName').value, document.getElementById('timerEventDesc').value, document.getElementById('timerTargetDate').value);
                document.getElementById('applyTimerRgbText').onclick=()=>{ document.getElementById('eventTitle').classList.add('rgb-text-animation'); showToast('✨ RGB текст включён!'); };
                document.getElementById('applyTimerRgbBorder').onclick=()=>{ document.querySelectorAll('.countdown-block').forEach(b=>b.classList.add('rgb-border-animation')); showToast('✨ RGB рамка включена!'); };
            }

            auth.onAuthStateChanged(async(user)=>{
                if(user){
                    currentUser=user;
                    await loadUserData(user);
                    renderShop();
                    renderMenu();
                    loadTimer();
                    bindButtons();
                    document.getElementById('authModal').style.display='none';
                }else{
                    document.getElementById('authModal').style.display='flex';
                    bindButtons();
                }
            });
        })();
    </script>
</body>
</html>
