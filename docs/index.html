<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrifLauncher | Магазин и профиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a0a 100%);
            font-family: 'Montserrat', sans-serif;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .hero-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.3;
        }
        .hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(30,30,0,0.7));
            z-index: -1;
        }
        .main-container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .balance {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
        }
        .balance span {
            color: #fff;
        }
        .btn-logout {
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 8px 24px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-logout:hover {
            background: rgba(239,68,68,0.2);
        }
        .menu-tabs {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .menu-tab {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,215,0,0.3);
            padding: 14px 38px;
            border-radius: 60px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            transition: 0.3s;
        }
        .menu-tab.active {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
        }
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: 38px;
            text-align: center;
            margin: 30px 0 45px;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 35px;
        }
        .product-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px;
            text-align: center;
            transition: 0.4s;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .product-card:hover {
            transform: translateY(-8px);
            border-color: #ffd700;
        }
        .product-icon i {
            font-size: 60px;
            color: #ffd700;
            margin-bottom: 18px;
        }
        .product-name {
            font-size: 26px;
            font-weight: bold;
        }
        .product-name-en {
            font-size: 14px;
            color: #ffd700;
            opacity: 0.8;
            margin-bottom: 12px;
        }
        .price {
            font-size: 34px;
            font-weight: bold;
            color: #ffd700;
            margin: 18px 0;
        }
        .product-card ul {
            list-style: none;
            margin: 20px 0;
            text-align: left;
        }
        .product-card li {
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .product-card li i {
            font-size: 16px;
            color: #ffd700;
            margin: 0;
        }
        .buy-btn {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #0a0a0a;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.2s;
        }
        .profile-card {
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 45px;
            text-align: center;
            max-width: 580px;
            margin: 0 auto;
        }
        .profile-avatar {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }
        .profile-avatar i {
            font-size: 65px;
            color: #0a0a0a;
        }
        .profile-info {
            text-align: left;
            margin: 25px 0;
        }
        .profile-info p {
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,215,0,0.2);
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .profile-info i {
            width: 30px;
            color: #ffd700;
        }
        .edit-btn, .change-password-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-left: 15px;
            font-size: 14px;
        }
        .admin-btn {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            z-index: 6000;
        }
        .modal-content {
            background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
            border-radius: 36px;
            padding: 35px;
            width: 450px;
            max-width: 90%;
            border: 1px solid #ffd700;
        }
        .modal-content input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 16px;
            color: white;
        }
        .modal-content button {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .close-modal {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #ffd700;
        }
        .verified-badge {
            width: 22px;
            height: 22px;
            margin-left: 8px;
            vertical-align: middle;
        }
        @media (max-width: 768px) {
            .section-title { font-size: 28px; }
            .shop-grid { grid-template-columns: 1fr; }
            .balance { font-size: 20px; }
        }
    </style>
</head>
<body>
    <video class="hero-video" autoplay loop muted playsinline>
        <source src="https://cdn.pixabay.com/video/2022/11/20/140315-774259399_large.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay"></div>

    <div id="loadingPage" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:flex; justify-content:center; align-items:center; z-index:9999;">
        <div style="text-align:center;">
            <div style="width:60px; height:60px; border:4px solid rgba(255,215,0,0.3); border-top-color:#ffd700; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 20px;"></div>
            <div style="font-family:'Orbitron'; color:#ffd700;">ЗАГРУЗКА ДАННЫХ...</div>
        </div>
    </div>

    <div class="main-container" id="mainContent" style="display: none;">
        <div class="top-bar">
            <div class="balance">💰 БАЛАНС: <span id="userBalance">0</span> ₽</div>
            <button class="btn-logout" id="logoutBtn">🚪 ВЫЙТИ</button>
        </div>

        <div class="menu-tabs">
            <div class="menu-tab active" data-page="shop">🛒 МАГАЗИН</div>
            <div class="menu-tab" data-page="profile">👤 ПРОФИЛЬ</div>
        </div>

        <div id="shopPage" class="page active">
            <div class="section-title">✨ ПРИВИЛЕГИИ</div>
            <div class="shop-grid" id="shopGrid"></div>
        </div>

        <div id="profilePage" class="page">
            <div class="section-title">👤 МОЙ ПРОФИЛЬ</div>
            <div class="profile-card">
                <div class="profile-avatar"><i class="fas fa-user"></i></div>
                <div style="display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 10px;">
                    <h2 id="profileName"></h2>
                    <button class="edit-btn" id="editNameBtn">✏️ Сменить имя</button>
                </div>
                <div class="profile-info" id="profileInfo"></div>
                <button class="change-password-btn" id="changePasswordBtn" style="width:100%; margin-bottom:15px;">🔑 Сменить пароль</button>
                <button class="admin-btn" id="openAdminBtn">👑 АДМИН ПАНЕЛЬ</button>
            </div>
        </div>
    </div>

    <!-- МОДАЛКА СМЕНЫ ИМЕНИ -->
    <div id="editNameModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeEditModal">&times;</span>
            <h3>Сменить имя</h3>
            <input type="text" id="newNameInput" placeholder="Новое имя">
            <button id="saveNameBtn">Сохранить</button>
        </div>
    </div>

    <!-- МОДАЛКА СМЕНЫ ПАРОЛЯ -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closePasswordModal">&times;</span>
            <h3>Сменить пароль</h3>
            <input type="password" id="oldPasswordInput" placeholder="Старый пароль">
            <input type="password" id="newPasswordInput" placeholder="Новый пароль (мин. 6 символов)">
            <button id="savePasswordBtn">Сохранить</button>
        </div>
    </div>

    <!-- АДМИН МОДАЛКА -->
    <div id="adminModal" class="modal">
        <div class="modal-content" style="max-width:600px; max-height:80vh; overflow-y:auto;">
            <span class="close-modal" id="closeAdminModal">&times;</span>
            <div id="adminPasswordPanel">
                <h3>🔐 ВХОД В АДМИН-ПАНЕЛЬ</h3>
                <input type="password" id="adminPassword" placeholder="Введите пароль">
                <button id="checkAdminPassword">ВОЙТИ</button>
            </div>
            <div id="adminPanelContent" style="display: none;">
                <h3>👑 АДМИН-ПАНЕЛЬ</h3>
                <div style="background:rgba(255,215,0,0.1); border-radius:20px; padding:15px; margin-bottom:15px;">
                    <h4>💰 МОНЕТЫ</h4>
                    <input type="text" id="giveNick" placeholder="Никнейм игрока">
                    <input type="number" id="giveAmountInput" placeholder="Сумма в рублях">
                    <textarea id="giveReasonInput" rows="2" placeholder="Причина выдачи"></textarea>
                    <button id="giveBalanceBtn">💸 ВЫДАТЬ МОНЕТЫ</button>
                    <div style="margin-top:15px; border-top:1px solid rgba(255,215,0,0.2); padding-top:15px;">
                        <input type="number" id="globalAmountInput" placeholder="Сумма для всех">
                        <textarea id="globalReasonInput" rows="2" placeholder="Причина глобальной выдачи"></textarea>
                        <button id="globalGiveBtn">🌍 ВЫДАТЬ ВСЕМ</button>
                    </div>
                </div>
                <div style="background:rgba(255,215,0,0.1); border-radius:20px; padding:15px; margin-bottom:15px;">
                    <h4>🔨 БАНЫ</h4>
                    <input type="text" id="banNick" placeholder="Никнейм игрока">
                    <input type="email" id="banEmail" placeholder="Email">
                    <textarea id="banReason" rows="2" placeholder="Причина бана"></textarea>
                    <select id="banDuration">
                        <option value="1">1 час</option>
                        <option value="6">6 часов</option>
                        <option value="12">12 часов</option>
                        <option value="24">1 день</option>
                        <option value="72">3 дня</option>
                        <option value="168">7 дней</option>
                        <option value="720">30 дней</option>
                        <option value="forever">Навсегда</option>
                    </select>
                    <button id="banUserBtn">⛔ ЗАБАНИТЬ</button>
                    <div id="bansList" style="margin-top:15px;"></div>
                </div>
                <div style="background:rgba(255,215,0,0.1); border-radius:20px; padding:15px; margin-bottom:15px;">
                    <h4>👢 КИКИ</h4>
                    <input type="text" id="kickNick" placeholder="Никнейм игрока">
                    <textarea id="kickReason" rows="2" placeholder="Причина кика"></textarea>
                    <button id="kickUserBtn">👢 КИКНУТЬ</button>
                </div>
                <div style="background:rgba(255,215,0,0.1); border-radius:20px; padding:15px; margin-bottom:15px;">
                    <h4>🔒 УПРАВЛЕНИЕ САЙТОМ</h4>
                    <textarea id="closeReason" rows="2" placeholder="Причина закрытия"></textarea>
                    <select id="closeDuration">
                        <option value="1">1 час</option>
                        <option value="3">3 часа</option>
                        <option value="6">6 часов</option>
                        <option value="12">12 часов</option>
                        <option value="24">1 день</option>
                        <option value="72">3 дня</option>
                        <option value="168">7 дней</option>
                    </select>
                    <button id="closeSiteBtn">🔒 ЗАКРЫТЬ САЙТ</button>
                    <button id="openSiteBtn" style="margin-top:10px; background:#22c55e;">🔓 ОТКРЫТЬ САЙТ</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCK9vHX-OQIw48SGi8S_8U7pIjq60gahEA",
            authDomain: "siteorgooo.firebaseapp.com",
            projectId: "siteorgooo",
            storageBucket: "siteorgooo.firebasestorage.app",
            messagingSenderId: "891797808455",
            appId: "1:891797808455:web:fa5e94be661dcc87d81862"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const ADMIN_EMAIL = "ramonenok@bk.ru";
        const VERIFIED_ICON_URL = "https://avatars.mds.yandex.net/i?id=f4634ad57cb43dc51bc43d742a13a4123a43d9a7-8709977-images-thumbs&n=13";

        const privileges = [
            { name: "Премиум", nameEn: "[PREM]", price: 1000, icon: "fa-crown", features: ["Цветной ник", "/kit", "/fly"] },
            { name: "Креатив", nameEn: "[CREAT]", price: 2500, icon: "fa-palette", features: ["Доступ к креативу", "WorldEdit"] },
            { name: "Модер", nameEn: "[MODER]", price: 5000, icon: "fa-shield-alt", features: ["Мут/кик", "Проверка игроков"] },
            { name: "Лорд", nameEn: "[LORD]", price: 10000, icon: "fa-crown", features: ["Команда /god", "Неприкосновенность"] },
            { name: "Админ", nameEn: "[ADMIN]", price: 20000, icon: "fa-user-tie", features: ["Баны/кики", "Управление"] },
            { name: "Гл Админ", nameEn: "[GLADMIN]", price: 50000, icon: "fa-users", features: ["Все права", "Управление админами"] },
            { name: "Создатель", nameEn: "[CREATOR]", price: 100000, icon: "fa-star", features: ["Полный доступ"] },
            { name: "Основатель", nameEn: "[FOUNDER]", price: 200000, icon: "fa-fire", features: ["Управление проектом"] },
            { name: "Консоль", nameEn: "[CONSOLE]", price: 300000, icon: "fa-terminal", features: ["Доступ к консоли"] },
            { name: "Цезарь", nameEn: "[CAESAR]", price: 400000, icon: "fa-landmark", features: ["Префикс [Цезарь]"] },
            { name: "Сервер", nameEn: "[SERVER]", price: 500000, icon: "fa-server", features: ["Управление сервером"] },
            { name: "Хелпер", nameEn: "[HELPER]", price: 600000, icon: "fa-handshake", features: ["Помощь игрокам"] },
            { name: "Хайп", nameEn: "[HYPE]", price: 700000, icon: "fa-chart-line", features: ["Премиум префикс"] },
            { name: "Стафф", nameEn: "[STAFF]", price: 800000, icon: "fa-tools", features: ["Работа со стаффом"] },
            { name: "Правитель", nameEn: "[LEADER]", price: 1000000, icon: "fa-chess-king", features: ["Верховный правитель"] }
        ];

        let currentUser = null;
        let currentBalance = 0;
        let currentUserData = null;

        function renderShop() {
            const container = document.getElementById('shopGrid');
            if(!container) return;
            container.innerHTML = privileges.map(p => `
                <div class="product-card">
                    <div class="product-icon"><i class="fas ${p.icon}"></i></div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-name-en">${p.nameEn}</div>
                    <div class="price">${p.price.toLocaleString()} ₽</div>
                    <ul>${p.features.map(f => `<li><i class="fas fa-check-circle"></i> ${f}</li>`).join('')}</ul>
                    <button class="buy-btn" onclick="alert('Покупка ${p.name} за ${p.price.toLocaleString()} ₽')">КУПИТЬ</button>
                </div>
            `).join('');
        }

        async function loadUserData(user) {
            const doc = await db.collection('users').doc(user.uid).get();
            if(doc.exists) {
                currentUserData = doc.data();
                currentBalance = currentUserData.balance || 50000;
                document.getElementById('userBalance').innerText = currentBalance.toLocaleString();
                document.getElementById('profileBalance').innerText = currentBalance.toLocaleString();
                
                // Отображаем ник с галочкой для админа
                const isAdmin = currentUserData.isAdmin || (user.email === ADMIN_EMAIL);
                if(isAdmin) {
                    document.getElementById('profileName').innerHTML = currentUserData.username + ` <img src="${VERIFIED_ICON_URL}" alt="Verified" class="verified-badge">`;
                } else {
                    document.getElementById('profileName').innerHTML = currentUserData.username;
                }
                
                document.getElementById('profileInfo').innerHTML = `
                    <p><i class="fas fa-envelope"></i> <strong>Email:</strong> ${user.email}</p>
                    <p><i class="fas fa-calendar"></i> <strong>Регистрация:</strong> ${currentUserData.registeredAt ? new Date(currentUserData.registeredAt).toLocaleDateString() : 'Сегодня'}</p>
                `;
            }
        }

        // СМЕНА ИМЕНИ
        document.getElementById('editNameBtn').onclick = () => document.getElementById('editNameModal').style.display = 'flex';
        document.getElementById('closeEditModal').onclick = () => document.getElementById('editNameModal').style.display = 'none';
        document.getElementById('saveNameBtn').onclick = async () => {
            const newName = document.getElementById('newNameInput').value.trim();
            if(!newName) return alert('Введите новое имя');
            try {
                await db.collection('users').doc(currentUser.uid).update({ username: newName });
                await currentUser.updateProfile({ displayName: newName });
                alert('Имя успешно изменено!');
                document.getElementById('editNameModal').style.display = 'none';
                loadUserData(currentUser);
            } catch(e) { alert('Ошибка: ' + e.message); }
        };

        // СМЕНА ПАРОЛЯ
        document.getElementById('changePasswordBtn').onclick = () => document.getElementById('changePasswordModal').style.display = 'flex';
        document.getElementById('closePasswordModal').onclick = () => document.getElementById('changePasswordModal').style.display = 'none';
        document.getElementById('savePasswordBtn').onclick = async () => {
            const oldPass = document.getElementById('oldPasswordInput').value;
            const newPass = document.getElementById('newPasswordInput').value;
            if(!oldPass || !newPass) return alert('Заполните все поля');
            if(newPass.length < 6) return alert('Новый пароль должен быть минимум 6 символов');
            try {
                const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, oldPass);
                await currentUser.reauthenticateWithCredential(credential);
                await currentUser.updatePassword(newPass);
                alert('Пароль успешно изменён!');
                document.getElementById('changePasswordModal').style.display = 'none';
                document.getElementById('oldPasswordInput').value = '';
                document.getElementById('newPasswordInput').value = '';
            } catch(e) { alert('Ошибка: ' + (e.code === 'auth/wrong-password' ? 'Неверный старый пароль' : e.message)); }
        };

        document.getElementById('logoutBtn').onclick = async () => { await auth.signOut(); };

        // ПЕРЕКЛЮЧЕНИЕ СТРАНИЦ
        document.querySelectorAll('.menu-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const page = tab.dataset.page;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(`${page}Page`).classList.add('active');
                if(page === 'profile' && currentUser) loadUserData(currentUser);
            };
        });

        // АДМИНКА
        document.getElementById('openAdminBtn').onclick = () => document.getElementById('adminModal').style.display = 'flex';
        document.getElementById('closeAdminModal').onclick = () => document.getElementById('adminModal').style.display = 'none';
        document.getElementById('checkAdminPassword').onclick = () => {
            if(document.getElementById('adminPassword').value === 'website') {
                document.getElementById('adminPasswordPanel').style.display = 'none';
                document.getElementById('adminPanelContent').style.display = 'block';
            } else alert('❌ Неверный пароль!');
        };

        async function loadBansList() {
            const container = document.getElementById('bansList');
            if(!container) return;
            const snapshot = await db.collection('bans').where('active', '==', true).orderBy('createdAt', 'desc').get();
            container.innerHTML = snapshot.docs.map(doc => {
                const ban = doc.data();
                return `<div style="background:rgba(0,0,0,0.5); border-radius:12px; padding:10px; margin-bottom:8px; border-left:3px solid #ef4444;"><strong>${ban.username || ban.email}</strong><br>📝 ${ban.reason}<br>⏰ До: ${ban.until ? new Date(ban.until.toDate()).toLocaleString() : 'Навсегда'}<br><button onclick="unbanUser('${doc.id}')" style="background:#22c55e; border:none; padding:5px 12px; border-radius:20px; cursor:pointer; margin-top:5px;">✅ СНЯТЬ БАН</button></div>`;
            }).join('');
        }

        window.unbanUser = async (banId) => {
            await db.collection('bans').doc(banId).update({ active: false });
            loadBansList();
            alert('✅ Бан снят!');
        };

        document.getElementById('banUserBtn').onclick = async () => {
            const nick = document.getElementById('banNick').value.trim();
            const email = document.getElementById('banEmail').value.trim();
            const reason = document.getElementById('banReason').value.trim();
            const duration = document.getElementById('banDuration').value;
            if((!nick && !email) || !reason) return alert('Заполните поля');
            let until = null;
            if(duration !== 'forever') until = new Date(Date.now() + parseInt(duration) * 60 * 60 * 1000);
            let targetUserId = null;
            if(email) {
                const snap = await db.collection('users').where('email', '==', email).get();
                if(!snap.empty) targetUserId = snap.docs[0].id;
            }
            await db.collection('bans').add({ userId: targetUserId, username: nick, email, reason, until, active: true, moderator: "Система", createdAt: new Date() });
            alert('✅ Бан выдан!');
            document.getElementById('banNick').value = ''; document.getElementById('banEmail').value = ''; document.getElementById('banReason').value = '';
            loadBansList();
        };

        document.getElementById('kickUserBtn').onclick = async () => {
            const nick = document.getElementById('kickNick').value.trim();
            const reason = document.getElementById('kickReason').value.trim();
            if(!nick || !reason) return alert('Заполните ник и причину');
            const snap = await db.collection('users').where('username', '==', nick).get();
            if(snap.empty) return alert('Пользователь не найден');
            await db.collection('kicks').add({ userId: snap.docs[0].id, email: snap.docs[0].data().email, username: nick, reason, moderator: "Система", active: true, createdAt: new Date() });
            alert(`✅ Кик выдан ${nick}`);
            document.getElementById('kickNick').value = ''; document.getElementById('kickReason').value = '';
        };

        document.getElementById('giveBalanceBtn').onclick = async () => {
            const nick = document.getElementById('giveNick').value.trim();
            const amount = parseInt(document.getElementById('giveAmountInput').value);
            const reason = document.getElementById('giveReasonInput').value.trim();
            if(!nick || isNaN(amount) || !reason) return alert('Заполните все поля');
            const snap = await db.collection('users').where('username', '==', nick).get();
            if(snap.empty) return alert('Пользователь не найден');
            const old = snap.docs[0].data().balance || 0;
            await snap.docs[0].ref.update({ balance: old + amount });
            alert(`✅ Выдано ${amount} ₽ ${nick}`);
            document.getElementById('giveNick').value = ''; document.getElementById('giveAmountInput').value = ''; document.getElementById('giveReasonInput').value = '';
        };

        document.getElementById('globalGiveBtn').onclick = async () => {
            const amount = parseInt(document.getElementById('globalAmountInput').value);
            if(isNaN(amount)) return alert('Введите сумму');
            const snap = await db.collection('users').get();
            for(const doc of snap.docs) await doc.ref.update({ balance: (doc.data().balance || 0) + amount });
            alert(`✅ Выдано ${amount} ₽ всем`);
            document.getElementById('globalAmountInput').value = ''; document.getElementById('globalReasonInput').value = '';
        };

        document.getElementById('closeSiteBtn').onclick = async () => {
            const reason = document.getElementById('closeReason').value.trim();
            const hours = parseInt(document.getElementById('closeDuration').value);
            if(!reason) return alert('Укажите причину');
            const until = new Date(Date.now() + hours * 60 * 60 * 1000);
            await db.collection('settings').doc('siteStatus').set({ closed: true, reason, until, moderator: "Система", closedAt: new Date() });
            alert('✅ Сайт закрыт');
        };
        document.getElementById('openSiteBtn').onclick = async () => {
            await db.collection('settings').doc('siteStatus').update({ closed: false });
            alert('✅ Сайт открыт');
        };

        auth.onAuthStateChanged(async (user) => {
            if(user) {
                currentUser = user;
                document.getElementById('loadingPage').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                await loadUserData(user);
                renderShop();
                const doc = await db.collection('users').doc(user.uid).get();
                if(!doc.exists || doc.data().isAdmin === undefined) {
                    await db.collection('users').doc(user.uid).update({ isAdmin: (user.email === ADMIN_EMAIL) });
                }
            } else {
                document.getElementById('loadingPage').style.display = 'none';
                document.getElementById('mainContent').style.display = 'none';
                alert('Пожалуйста, войдите в аккаунт. Откройте консоль Firebase и войдите.');
                auth.signInWithEmailAndPassword('ramonenok@bk.ru', 'ваш_пароль').catch(() => {
                    window.location.href = 'https://console.firebase.google.com';
                });
            }
        });
    </script>
</body>
</html>
