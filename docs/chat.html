<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrifLauncher | Чат</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">GRIF LAUNCHER</div>
        <div class="sidebar-menu">
            <a href="index.html" class="menu-item"><i class="fas fa-home"></i> Главная</a>
            <a href="shop.html" class="menu-item"><i class="fas fa-store"></i> Магазин</a>
            <a href="chat.html" class="menu-item active"><i class="fas fa-comments"></i> Чат</a>
            <a href="profile.html" class="menu-item"><i class="fas fa-user"></i> Профиль</a>
            <a href="gallery.html" class="menu-item"><i class="fas fa-image"></i> Галерея</a>
            <a href="support.html" class="menu-item"><i class="fas fa-ticket-alt"></i> Поддержка</a>
        </div>
        <div class="sidebar-footer">
            <div id="authStatus"></div>
            <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
        </div>
    </div>

    <div class="main-content chat-layout">
        <div class="channels-sidebar">
            <div class="channels-header">💬 Каналы</div>
            <div class="channel active">#общий</div>
            <div class="channel">#торговля</div>
            <div class="channel">#помощь</div>
        </div>
        <div class="chat-area">
            <div class="chat-header"><h3>#общий</h3></div>
            <div class="messages" id="messages"></div>
            <div class="message-input">
                <input type="text" id="messageInput" placeholder="Напишите сообщение...">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
